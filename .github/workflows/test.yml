name: "Test PR Size Labeler"

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  label:
    name: Label PR by Size
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run PR Size Labeler
        uses: ./
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
